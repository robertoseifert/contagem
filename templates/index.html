<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Contador de Estoque</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

header{
background:#1f1f1f;
padding:15px;
font-size:22px;
}

#camera{
width:100%;
max-width:600px;
margin:auto;
border-radius:10px;
overflow:hidden;
}

.container{
padding:20px;
}

input{
width:90%;
max-width:400px;
padding:15px;
font-size:20px;
margin:10px;
border-radius:8px;
border:none;
}

button{
width:90%;
max-width:400px;
padding:15px;
font-size:20px;
background:#00c853;
border:none;
color:white;
border-radius:10px;
}

button:active{
background:#009624;
}

</style>

</head>

<body>

<header>
📦 Contador de Estoque
</header>

<div id="camera"></div>

<div class="container">

<div>
EAN
</div>

<input id="ean" readonly>

<div>
Quantidade
</div>

<input id="qtd" type="number" value="1">

<button onclick="salvar()">
Salvar
</button>

</div>

<script>

function iniciarCamera(deviceId){

Quagga.init({

inputStream:{
name:"Live",
type:"LiveStream",
target:document.querySelector('#camera'),

constraints:{
deviceId:deviceId,
width:{min:640},
height:{min:480}
}

},

locator:{
patchSize:"large",
halfSample:true
},

numOfWorkers:4,
frequency:10,

decoder:{
readers:[
"ean_reader",
"ean_8_reader"
]
}

},function(err){

if(err){
console.log(err)
return
}

Quagga.start()

})

}

navigator.mediaDevices.enumerateDevices().then(devices=>{

let camera = devices.find(d => d.kind === "videoinput" && d.label.toLowerCase().includes("back"))

if(!camera){
camera = devices.find(d => d.kind === "videoinput")
}

iniciarCamera(camera.deviceId)

})

Quagga.onDetected(function(data){

let codigo = data.codeResult.code

document.getElementById("ean").value = codigo

})

function salvar(){

let ean = document.getElementById("ean").value
let qtd = document.getElementById("qtd").value

fetch("/salvar",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
ean:ean,
quantidade:qtd
})
})

document.getElementById("qtd").value="1"

alert("Salvo!")

}

</script>

</body>
</html>
