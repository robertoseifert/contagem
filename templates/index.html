<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Contador de Estoque</title>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

header{
background:#1f1f1f;
padding:15px;
font-size:22px;
}

#camera{
width:100%;
max-width:600px;
margin:auto;
border-radius:10px;
}

.container{
padding:20px;
}

input{
width:90%;
max-width:400px;
padding:15px;
font-size:20px;
margin:10px;
border-radius:8px;
border:none;
}

button{
width:90%;
max-width:400px;
padding:15px;
font-size:20px;
background:#00c853;
border:none;
color:white;
border-radius:10px;
}

button:active{
background:#009624;
}

</style>

</head>

<body>

<header>
📦 Contador de Estoque
</header>

<video id="camera"></video>

<div class="container">

<div>EAN</div>

<input id="ean" readonly>

<div>Quantidade</div>

<input id="qtd" type="number" value="1">

<button onclick="salvar()">Salvar</button>

</div>

<script>

const codeReader = new ZXing.BrowserMultiFormatReader()

navigator.mediaDevices.enumerateDevices().then(devices => {

let camera = devices.find(d =>
d.kind === "videoinput" &&
d.label.toLowerCase().includes("back")
)

if(!camera){
camera = devices.find(d => d.kind === "videoinput")
}

codeReader.decodeFromVideoDevice(camera.deviceId, 'camera', (result, err) => {

if(result){

let codigo = result.text

document.getElementById("ean").value = codigo

navigator.vibrate(100)

}

})

})

function salvar(){

let ean = document.getElementById("ean").value
let qtd = document.getElementById("qtd").value

fetch("/salvar",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
ean:ean,
quantidade:qtd
})
})

document.getElementById("qtd").value = "1"

alert("Salvo!")

}

</script>

</body>

</html>
