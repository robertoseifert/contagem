<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner de Estoque</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background-color: #f4f4f9; }
        #reader { width: 100%; max-width: 500px; border: 2px solid #333; border-radius: 8px; overflow: hidden; }
        .form-group { margin-top: 20px; width: 100%; max-width: 500px; display: flex; flex-direction: column; }
        input { padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }
        button { padding: 15px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background-color: #218838; }
        .status { margin-top: 10px; color: #666; font-style: italic; }
    </style>
</head>
<body>

    <h2>Contagem de Estoque</h2>

    <div id="reader"></div>

    <div class="form-group">
        <label>Código do Item:</label>
        <input type="text" id="codigo" placeholder="Aguardando leitura..." readonly>
        
        <label>Quantidade em Estoque:</label>
        <input type="number" id="quantidade" value="1" min="1">
        
        <button onclick="salvarContagem()">Salvar no Sistema</button>
        <p class="status" id="msg"></p>
    </div>

    <script>
        function onScanSuccess(decodedText, decodedResult) {
            // Quando ler o código, coloca no campo de texto
            document.getElementById('codigo').value = decodedText;
            document.getElementById('msg').innerText = "Código lido com sucesso!";
            
            // Opcional: focar na quantidade após ler o código
            document.getElementById('quantidade').focus();
        }

        function onScanFailure(error) {
            // Erros de leitura (comum enquanto a câmera foca)
            // Não precisamos exibir nada aqui para não poluir
        }

        // Configuração do Scanner
        let html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", { fps: 10, qrbox: {width: 250, height: 150} }
        );
        html5QrcodeScanner.render(onScanSuccess, onScanFailure);

        function salvarContagem() {
            const cod = document.getElementById('codigo').value;
            const qtd = document.getElementById('quantidade').value;

            if(!cod) {
                alert("Por favor, escaneie um item primeiro!");
                return;
            }

            // Aqui você faria o FETCH para o seu Postgres futuramente
            console.log("Enviando para o banco:", { codigo: cod, quantidade: qtd });
            alert(`Sucesso! Código: ${cod} | Qtd: ${qtd}\n(Pronto para enviar ao Postgres)`);
            
            // Limpa para a próxima leitura
            document.getElementById('codigo').value = "";
            document.getElementById('msg').innerText = "Aguardando próxima leitura...";
        }
    </script>
</body>
</html>
